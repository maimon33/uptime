name: Publish artifacts

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'cloudformation/**'
      - 'scripts/package.sh'
      - 'scripts/publish-artifacts.sh'
      - 'scripts/deploy-new-version.sh'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ARTIFACT_PREFIX: uptime
  TEMPLATE_BUCKET: www.maimons.dev
  TEMPLATE_REGION: us-east-1

jobs:
  publish-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE_ARN }}
          aws-region: us-east-1

      - name: Publish public templates
        run: |
          aws s3 cp cloudformation/uptime-bootstrap.yaml "s3://${TEMPLATE_BUCKET}/${ARTIFACT_PREFIX}/cloudformation/uptime-bootstrap.yaml"
          aws s3 cp cloudformation/uptime-artifacts.yaml "s3://${TEMPLATE_BUCKET}/${ARTIFACT_PREFIX}/cloudformation/uptime-artifacts.yaml"

  publish-regional-artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: us-east-1
            bucket: uptime-artifacts-us-east-1.maimons.dev
          - region: eu-west-1
            bucket: uptime-artifacts-eu-west-1.maimons.dev
          - region: eu-central-1
            bucket: uptime-artifacts-eu-central-1.maimons.dev
          - region: ap-southeast-1
            bucket: uptime-artifacts-ap-southeast-1.maimons.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Publish regional artifacts
        run: |
          chmod +x scripts/publish-artifacts.sh scripts/package.sh
          ./scripts/publish-artifacts.sh "${{ matrix.bucket }}" "${ARTIFACT_PREFIX}"

  summary:
    runs-on: ubuntu-latest
    needs:
      - publish-template
      - publish-regional-artifacts
    if: success()

    steps:
      - name: Publish summary
        run: |
          echo "### Published artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Template bucket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`s3://${TEMPLATE_BUCKET}/${ARTIFACT_PREFIX}/cloudformation/uptime-bootstrap.yaml\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`s3://${TEMPLATE_BUCKET}/${ARTIFACT_PREFIX}/cloudformation/uptime-artifacts.yaml\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Regional Lambda ZIP buckets:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`s3://uptime-artifacts-us-east-1.maimons.dev/${ARTIFACT_PREFIX}/releases/management.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`s3://uptime-artifacts-eu-west-1.maimons.dev/${ARTIFACT_PREFIX}/releases/management.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`s3://uptime-artifacts-eu-central-1.maimons.dev/${ARTIFACT_PREFIX}/releases/management.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`s3://uptime-artifacts-ap-southeast-1.maimons.dev/${ARTIFACT_PREFIX}/releases/management.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Quick-create example:" >> "$GITHUB_STEP_SUMMARY"
          echo "- https://console.aws.amazon.com/cloudformation/home?region=${TEMPLATE_REGION}#/stacks/quickcreate?templateURL=https://${TEMPLATE_BUCKET}.s3.amazonaws.com/${ARTIFACT_PREFIX}/cloudformation/uptime-bootstrap.yaml" >> "$GITHUB_STEP_SUMMARY"
