AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Uptime bootstrap stack. Creates the initial home-region resources:
  management Lambda, Function URL, EventBridge schedule, DynamoDB tables,
  Secrets Manager admin key, IAM role, and logs. The region where this stack is launched
  becomes the home region. This template may be hosted in a central bucket,
  but the management Lambda zip must be read from a bucket in the same region
  as the stack's home region. Public artifact mapping currently supports only
  us-east-1, eu-west-1, eu-central-1, and ap-southeast-1.

Parameters:
  AdminApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Admin password/token. Leave blank to auto-generate in Secrets Manager.
  AdminAuthMode:
    Type: String
    Default: password
    AllowedValues:
      - password
      - cognito
    Description: Authentication mode to prepare for the admin UI. Password keeps the shared admin key flow active. Cognito provisions a user pool/client/domain for a later Cognito login integration.
  AdminAllowedIpCidrs:
    Type: String
    Default: ''
    Description: Optional comma-separated IPv4/IPv6 CIDRs allowed to access /admin and /api. Leave blank to allow any IP. Useful as a hardening step for password-only mode.
  CognitoManagedDomainPrefix:
    Type: String
    Default: ''
    AllowedPattern: '^$|[a-z0-9-]{3,63}$'
    Description: Optional Cognito managed-login domain prefix, for example my-uptime-admin. Used only when AdminAuthMode is cognito.
  CognitoAllowedEmailDomain:
    Type: String
    Default: ''
    Description: Optional operator email domain hint, for example maimons.dev. Stored in Lambda env for the upcoming Cognito login flow.
  CognitoMfaMode:
    Type: String
    Default: OPTIONAL
    AllowedValues:
      - OFF
      - OPTIONAL
      - ON
    Description: MFA mode for the Cognito user pool when AdminAuthMode is cognito. TOTP is enabled in the pool.
  PublicDemoPageEnabled:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable the optional public /demo product explanation page. Leave false for normal deployments.

Conditions:
  HasProvidedAdminApiKey: !Not
    - !Equals
      - !Ref AdminApiKey
      - ''
  UseCognitoAuth: !Equals
    - !Ref AdminAuthMode
    - cognito
  CognitoMfaEnabled: !Not
    - !Equals
      - !Ref CognitoMfaMode
      - OFF
  HasCognitoManagedDomainPrefix: !Not
    - !Equals
      - !Ref CognitoManagedDomainPrefix
      - ''
  CreateCognitoManagedDomain: !And
    - !Condition UseCognitoAuth
    - !Condition HasCognitoManagedDomainPrefix

Mappings:
  # The CloudFormation template itself can be served from any public bucket.
  # This mapping is only for the Lambda ZIP artifact, which Lambda requires
  # to come from an S3 bucket in the same region as the function being created.
  # Only the four regions below are supported by the public artifact publishing flow today.
  ArtifactBuckets:
    us-east-1:
      Name: uptime-artifacts-us-east-1.maimons.dev
    eu-west-1:
      Name: uptime-artifacts-eu-west-1.maimons.dev
    eu-central-1:
      Name: uptime-artifacts-eu-central-1.maimons.dev
    ap-southeast-1:
      Name: uptime-artifacts-ap-southeast-1.maimons.dev

Resources:
  HostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: uptime-hosts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: host_id
          AttributeType: S
      KeySchema:
        - AttributeName: host_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  ChecksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: uptime-checks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: host_id
          AttributeType: S
        - AttributeName: checked_at
          AttributeType: S
      KeySchema:
        - AttributeName: host_id
          KeyType: HASH
        - AttributeName: checked_at
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  AdminKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: uptime/admin-key
      Description: Admin API key for uptime management Lambda
      SecretString: !If
        - HasProvidedAdminApiKey
        - !Ref AdminApiKey
        - !Ref AWS::NoValue
      GenerateSecretString: !If
        - HasProvidedAdminApiKey
        - !Ref AWS::NoValue
        - ExcludePunctuation: true
          GenerateStringKey: password
          PasswordLength: 40
          SecretStringTemplate: '{"type":"uptime-admin-key"}'
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  AdminUserPool:
    Type: AWS::Cognito::UserPool
    Condition: UseCognitoAuth
    Properties:
      UserPoolName: uptime-admin
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: !Ref CognitoMfaMode
      EnabledMfas: !If
        - CognitoMfaEnabled
        - [SOFTWARE_TOKEN_MFA]
        - !Ref AWS::NoValue
      Policies:
        PasswordPolicy:
          MinimumLength: 14
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolTags:
        Project: uptime
        ManagedBy: cloudformation

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: UseCognitoAuth
    Properties:
      ClientName: uptime-admin
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      AllowedOAuthFlowsUserPoolClient: false

  AdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: CreateCognitoManagedDomain
    Properties:
      Domain: !Ref CognitoManagedDomainPrefix
      UserPoolId: !Ref AdminUserPool

  ManagementLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/uptime-management
      RetentionInDays: 14

  ManagementRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: uptime-management
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: uptime-management
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: OwnLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/uptime-management:*'
              - Sid: ReadLogs
                Effect: Allow
                Action:
                  - logs:FilterLogEvents
                  - logs:GetLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/uptime-management'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/uptime-management:*'
                  - !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/lambda/uptime-monitor-*'
                  - !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/lambda/uptime-monitor-*:*'
              - Sid: ReadLogsCatalog
                Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource: '*'
              - Sid: Data
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt HostsTable.Arn
                  - !GetAtt ChecksTable.Arn
              - Sid: AdminKey
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AdminKeySecret
              - Sid: CognitoAdminAuth
                Effect: Allow
                Action:
                  - cognito-idp:AssociateSoftwareToken
                  - cognito-idp:ChangePassword
                  - cognito-idp:DeleteUserAttributes
                  - cognito-idp:InitiateAuth
                  - cognito-idp:SetUserMFAPreference
                  - cognito-idp:RespondToAuthChallenge
                  - cognito-idp:GetUser
                  - cognito-idp:UpdateUserAttributes
                  - cognito-idp:VerifySoftwareToken
                Resource: '*'
              - Sid: Alerts
                Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:*'
              - Sid: CustomDomain
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:AddTagsToCertificate
                  - cloudfront:CreateDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                Resource: '*'
              - Sid: Metrics
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                Resource: '*'
              - Sid: MonitorLambda
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:ListFunctions
                Resource: !Sub 'arn:aws:lambda:*:${AWS::AccountId}:function:uptime-monitor-*'
              - Sid: MonitorIAM
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/uptime-monitor'
              - Sid: MonitorLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                Resource: !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/lambda/uptime-monitor-*'
              - Sid: STS
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  ManagementFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: uptime-management
      Runtime: python3.12
      Handler: handler.handler
      Role: !GetAtt ManagementRole.Arn
      Timeout: 300
      MemorySize: 256
      Code:
        # Region-matched artifact bucket selected from the mapping above.
        S3Bucket: !FindInMap
          - ArtifactBuckets
          - !Ref AWS::Region
          - Name
        S3Key: uptime/releases/management.zip
      Environment:
        Variables:
          HOSTS_TABLE: !Ref HostsTable
          CHECKS_TABLE: !Ref ChecksTable
          ADMIN_KEY_SECRET: !Ref AdminKeySecret
          ADMIN_AUTH_MODE: !Ref AdminAuthMode
          ADMIN_ALLOWED_IP_CIDRS: !Ref AdminAllowedIpCidrs
          COGNITO_USER_POOL_ID: !If
            - UseCognitoAuth
            - !Ref AdminUserPool
            - ''
          COGNITO_USER_POOL_CLIENT_ID: !If
            - UseCognitoAuth
            - !Ref AdminUserPoolClient
            - ''
          COGNITO_USER_POOL_DOMAIN: !If
            - CreateCognitoManagedDomain
            - !Sub 'https://${CognitoManagedDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
            - ''
          COGNITO_ALLOWED_EMAIL_DOMAIN: !Ref CognitoAllowedEmailDomain
          COGNITO_MFA_MODE: !If
            - UseCognitoAuth
            - !Ref CognitoMfaMode
            - ''
          HOME_REGION: !Ref AWS::Region
          PROJECT: uptime
          RETENTION_DAYS: '90'
          STATUS_PAGE_TITLE: System Status
          STATUS_PAGE_DESC: Real-time status of our services
          PUBLIC_DEMO_PAGE_ENABLED: !Ref PublicDemoPageEnabled
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation
    DependsOn:
      - ManagementLogGroup

  ManagementScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: uptime-management-schedule
      Description: uptime central monitor orchestration schedule
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Id: management-lambda
          Arn: !GetAtt ManagementFunction.Arn

  AllowEventBridgeInvokeManagement:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ManagementFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ManagementScheduleRule.Arn

  ManagementFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ManagementFunction.Arn
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300

  AllowPublicFunctionUrl:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ManagementFunction
      Principal: '*'
      FunctionUrlAuthType: NONE

  AllowPublicFunctionUrlInvokeFunction:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ManagementFunction
      Principal: '*'
      InvokedViaFunctionUrl: true

Outputs:
  HomeRegion:
    Description: Stack home region. This is where management, DynamoDB, Secrets Manager, logs, and the central schedule live.
    Value: !Ref AWS::Region

  ManagementFunctionUrl:
    Description: Raw Lambda Function URL.
    Value: !GetAtt ManagementFunctionUrl.FunctionUrl

  StatusPageUrl:
    Description: Public status page URL.
    Value: !GetAtt ManagementFunctionUrl.FunctionUrl

  AdminUrl:
    Description: Admin UI URL. Password mode uses the shared admin key today. Cognito resources may also be provisioned for a later hosted-login integration.
    Value: !Sub '${ManagementFunctionUrl.FunctionUrl}admin'

  AdminKeySecretArn:
    Description: Secrets Manager ARN containing the admin key.
    Value: !Ref AdminKeySecret

  AdminAuthMode:
    Description: Admin auth mode selected for this stack.
    Value: !Ref AdminAuthMode

  AdminAllowedIpCidrs:
    Description: Optional admin IP allowlist configured for /admin and /api.
    Value: !Ref AdminAllowedIpCidrs

  CognitoUserPoolId:
    Condition: UseCognitoAuth
    Description: Cognito User Pool ID prepared for admin authentication.
    Value: !Ref AdminUserPool

  CognitoUserPoolClientId:
    Condition: UseCognitoAuth
    Description: Cognito User Pool Client ID prepared for admin authentication.
    Value: !Ref AdminUserPoolClient

  CognitoManagedLoginDomain:
    Condition: CreateCognitoManagedDomain
    Description: Cognito managed-login base URL.
    Value: !Sub 'https://${CognitoManagedDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'

  HostsTableName:
    Description: DynamoDB table for hosts, settings, and region records.
    Value: !Ref HostsTable

  ChecksTableName:
    Description: DynamoDB table for check history.
    Value: !Ref ChecksTable
