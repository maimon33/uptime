AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Uptime bootstrap stack. Creates the initial home-region resources:
  management Lambda, Function URL, EventBridge schedule, DynamoDB tables,
  Secrets Manager admin key, IAM role, and logs. The region where this stack is launched
  becomes the home region.

Parameters:
  AdminApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Admin password/token. Leave blank to auto-generate in Secrets Manager.

Conditions:
  HasProvidedAdminApiKey: !Not [!Equals [!Ref AdminApiKey, '']]

Resources:
  HostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: uptime-hosts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: host_id
          AttributeType: S
      KeySchema:
        - AttributeName: host_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  ChecksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: uptime-checks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: host_id
          AttributeType: S
        - AttributeName: checked_at
          AttributeType: S
      KeySchema:
        - AttributeName: host_id
          KeyType: HASH
        - AttributeName: checked_at
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  AdminKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: uptime/admin-key
      Description: Admin API key for uptime management Lambda
      SecretString: !If [HasProvidedAdminApiKey, !Ref AdminApiKey, !Ref AWS::NoValue]
      GenerateSecretString: !If
        - HasProvidedAdminApiKey
        - !Ref AWS::NoValue
        - ExcludePunctuation: true
          GenerateStringKey: password
          PasswordLength: 40
          SecretStringTemplate: '{"type":"uptime-admin-key"}'
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  ManagementLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/uptime-management
      RetentionInDays: 14

  ManagementRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: uptime-management
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: uptime-management
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: OwnLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/uptime-management:*'
              - Sid: Data
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt HostsTable.Arn
                  - !GetAtt ChecksTable.Arn
              - Sid: AdminKey
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AdminKeySecret
              - Sid: Alerts
                Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:*'
              - Sid: MonitorLambda
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:ListFunctions
                Resource: !Sub 'arn:aws:lambda:*:${AWS::AccountId}:function:uptime-monitor-*'
              - Sid: MonitorIAM
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/uptime-monitor'
              - Sid: MonitorLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                Resource: !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/lambda/uptime-monitor-*'
              - Sid: STS
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation

  ManagementFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: uptime-management
      Runtime: python3.12
      Handler: handler.handler
      Role: !GetAtt ManagementRole.Arn
      Timeout: 300
      MemorySize: 256
      Code:
        S3Bucket: www.maimons.dev
        S3Key: uptime/releases/management.zip
      Environment:
        Variables:
          HOSTS_TABLE: !Ref HostsTable
          CHECKS_TABLE: !Ref ChecksTable
          ADMIN_KEY_SECRET: !Ref AdminKeySecret
          HOME_REGION: !Ref AWS::Region
          PROJECT: uptime
          RETENTION_DAYS: '90'
          STATUS_PAGE_TITLE: System Status
          STATUS_PAGE_DESC: Real-time status of our services
      Tags:
        - Key: Project
          Value: uptime
        - Key: ManagedBy
          Value: cloudformation
    DependsOn:
      - ManagementLogGroup

  ManagementScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: uptime-management-schedule
      Description: uptime central monitor orchestration schedule
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Id: management-lambda
          Arn: !GetAtt ManagementFunction.Arn

  AllowEventBridgeInvokeManagement:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ManagementFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ManagementScheduleRule.Arn

  ManagementFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ManagementFunction.Arn
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300

  AllowPublicFunctionUrl:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ManagementFunction
      Principal: '*'
      FunctionUrlAuthType: NONE

Outputs:
  HomeRegion:
    Description: Stack home region. This is where management, DynamoDB, Secrets Manager, logs, and the central schedule live.
    Value: !Ref AWS::Region

  ManagementFunctionUrl:
    Description: Raw Lambda Function URL.
    Value: !GetAtt ManagementFunctionUrl.FunctionUrl

  StatusPageUrl:
    Description: Public status page URL.
    Value: !GetAtt ManagementFunctionUrl.FunctionUrl

  AdminUrl:
    Description: Admin UI URL. Append ?key=<your-admin-key>.
    Value: !Sub '${ManagementFunctionUrl.FunctionUrl}admin'

  AdminKeySecretArn:
    Description: Secrets Manager ARN containing the admin key.
    Value: !Ref AdminKeySecret

  HostsTableName:
    Description: DynamoDB table for hosts, settings, and region records.
    Value: !Ref HostsTable

  ChecksTableName:
    Description: DynamoDB table for check history.
    Value: !Ref ChecksTable
